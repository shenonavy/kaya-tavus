<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Playground</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            padding: 24px;
        }

        .iframe-container {
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background-color: #ffffff;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: 0;
            display: block;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0C0E12;
            }

            .iframe-container {
                background-color: #0C0E12;
                border-color: #373A41;
            }
        }
    </style>
</head>

<body>
    <div class="iframe-container">
        <script src="https://admin.dev.kayatech.ai/js/framing.js" defer></script>
        <iframe
            id="kaya-avatar-iframe"
            src="https://admin.dev.kayatech.ai/avatar/e48226f9-4291-402f-be36-4a26fbbc3f7d/4bb9f20d-37ce-421a-9ce6-65b21208d49d"
            title="Avatar Playground"
            allow="camera; microphone; autoplay; clipboard-read; clipboard-write; display-capture"
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
